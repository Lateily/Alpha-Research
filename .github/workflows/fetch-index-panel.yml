name: Fetch Index Panel (multi-benchmark, 20yr daily)

# Per v3 §3.2 v3b task — fetch CSI300 / ZZ500 / ZZ1000 / SSE50 / HSI daily close
# 20yr, persist to data_history/panel/index_prices.parquet (separate from the
# stock-only daily_prices.parquet to avoid polluting the universe).
#
# Tushare TOKEN lives in GHA secrets. Local token is invalid.
# Manual trigger via Actions tab or `gh workflow run fetch-index-panel.yml`.

on:
  workflow_dispatch:
    inputs:
      start:
        description: 'Start date YYYY-MM-DD (default 20yr back)'
        required: false
        default: '2006-01-01'
      end:
        description: 'End date YYYY-MM-DD'
        required: false
        default: '2026-05-27'

permissions:
  contents: read

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 20    # 8 indices × full-history is cheap (~3-5 minutes total)

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install tushare pandas pyarrow --quiet

      # Sanity: confirm token works
      - name: Verify Tushare token
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: |
          python - <<'PY'
          import os, tushare as ts
          tok = os.environ["TUSHARE_TOKEN"]
          ts.set_token(tok)
          pro = ts.pro_api()
          df = pro.trade_cal(start_date="20260520", end_date="20260526")
          print(f"trade_cal OK: {len(df)} rows")
          assert len(df) > 0, "trade_cal empty — token may be invalid"
          PY

      # Index fetch — per-index full-history loop
      - name: Fetch index panel
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: |
          python -u scripts/fetch_index_panel.py \
            --start "${{ github.event.inputs.start }}" \
            --end "${{ github.event.inputs.end }}"
          echo "===== panel files ====="
          ls -la data_history/panel/

      # Per-ticker depth report
      - name: Report depth
        run: |
          python - <<'PY'
          import pandas as pd
          from pathlib import Path
          p = Path("data_history/panel/index_prices.parquet")
          if not p.exists():
              print("MISSING: index_prices.parquet")
              raise SystemExit(1)
          df = pd.read_parquet(p)
          print(f"total: {len(df):,} rows, {df['ts_code'].nunique()} indices")
          print(df.groupby('ts_code')['trade_date'].agg(['min', 'max', 'count']).to_string())
          PY

      # Upload artifact (gitignored — caller downloads via `gh run download`)
      - name: Upload panel artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: index-panel-${{ github.run_id }}
          path: data_history/panel/index_prices.parquet
          retention-days: 14
          if-no-files-found: warn
