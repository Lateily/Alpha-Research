name: Daily Market Data + Alerts

on:
  schedule:
    # 00:30 UTC = 08:30 HKT  (30 min after HK open; also captures A-share pre-market)
    # 08:30 UTC = 16:30 CST  (after A-share + HK close — main data run)
    - cron: '30 8 * * 1-5'   # Primary: after-close digest
    - cron: '0 1  * * 1-5'   # Secondary: pre-market snapshot
  workflow_dispatch:          # Manual trigger from Actions tab

permissions:
  contents: write
  actions: write    # needed to dispatch deploy.yml via gh workflow run

jobs:
  fetch-and-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install \
            yfinance \
            akshare \
            pandas \
            requests \
            supabase \
            tushare \
            --quiet

      # ── Step 1: Fetch all market data ──────────────────────────────────────
      # continue-on-error: akshare frequently fails from GitHub US IPs due to
      # Chinese data source restrictions. We still want the commit/push steps
      # to run so that whatever data WAS fetched successfully gets saved.
      - name: Run data fetcher v4.0
        id: fetcher
        continue-on-error: true
        run: python scripts/fetch_data.py

      # ── Step 2: Paper trading P&L update ──────────────────────────────────
      - name: Run paper trading engine
        continue-on-error: true          # non-critical; don't block data commit
        run: python scripts/paper_trading.py

      # ── Step 2b: VP Score backtest ─────────────────────────────────────────
      - name: Run backtest engine
        continue-on-error: true          # non-critical; don't block data commit
        run: python scripts/backtest.py --threshold 60

      # ── Step 2c: Swing trading signals ────────────────────────────────────
      - name: Compute swing signals
        continue-on-error: true          # non-critical; pure Python, no network
        run: python scripts/swing_signals.py

      # ── Step 2d: AI Infrastructure Leading Indicators ───────────────────
      # Fetches hyperscaler CapEx + NVDA + TSMC quarterly data.
      # Runs early (after fetch) so composite signal is available for confluence.
      - name: Fetch leading indicators
        continue-on-error: true          # non-critical; US market data
        run: python scripts/leading_indicators.py

      # ── Step 2d.5: Tushare A-share data ──────────────────────────────────
      # Tushare 6000-tier active. Per-ticker A-share data + market-wide hsgt
      # money flow. Forward-compatible per DATA_SOURCE_REGISTRY.md —
      # tier-locked APIs (forecast) marked _status: tier_locked in output,
      # populate when tier upgraded.
      - name: "Step 2d.5: Fetch Tushare A-share data (6000-tier)"
        continue-on-error: true
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: python scripts/fetch_tushare.py

      # ── Step 2d.6: Tushare capital flow ──────────────────────────────────
      # Tushare 15000-tier concept-board + industry-board daily net inflow.
      # Forward-compatible: unavailable endpoint names/tiers preserve schema
      # with _status: endpoint_unavailable.
      - name: "Step 2d.6: Fetch Tushare capital flow (15000-tier)"
        continue-on-error: true
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: python scripts/fetch_capital_flow.py

      # ── Step 2d.7: Tushare chip distribution ────────────────────────────
      # Tushare 15000-tier per-watchlist 筹码分布 (cyq_chips).
      # Forward-compatible: unavailable endpoint names/tiers preserve schema
      # with _status: endpoint_unavailable or tier_locked per ticker.
      - name: "Step 2d.7: Fetch Tushare chip distribution (15000-tier)"
        continue-on-error: true
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: python scripts/fetch_chip_distribution.py

      # ── Step 2d.8: Tushare consensus forecast ──────────────────────────
      # Tushare 15000-tier per-watchlist 盈利预测 / consensus forecast.
      # Forward-compatible: unavailable endpoint names/tiers preserve schema
      # with _status: endpoint_unavailable or tier_locked per ticker.
      - name: "Step 2d.8: Fetch Tushare consensus forecast (15000-tier)"
        continue-on-error: true
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: python scripts/fetch_consensus_forecast.py

      # ── Step 2d.9: Tushare 龙虎榜 ───────────────────────────────────────
      # Tushare 15000-tier per-watchlist 30-day 龙虎榜 appearances.
      # Forward-compatible: unavailable endpoint names/tiers preserve schema
      # with _status: endpoint_unavailable or tier_locked per ticker.
      - name: "Step 2d.9: Fetch Tushare LHB top list (15000-tier)"
        continue-on-error: true
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: python scripts/fetch_lhb.py

      # ── Step 2d.10: Tushare 量化因子 ────────────────────────────────────
      # Tushare 15000-tier per-watchlist daily quant factors (PE/PB/PS/turnover/
      # momentum/volatility/etc). STRATEGIC: data layer for future quant strategy
      # KR. Forward-compatible: unavailable endpoint names/tiers preserve schema.
      - name: "Step 2d.10: Fetch Tushare quant factors (15000-tier)"
        continue-on-error: true
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: python scripts/fetch_quant_factors.py

      # ── Step 2d.11: Tushare 涨停板单 ───────────────────────────────────
      # Tushare 15000-tier market-wide daily limit-up / limit-down board list.
      # Forward-compatible: unavailable endpoint names/tiers preserve schema.
      - name: "Step 2d.11: Fetch Tushare limit list (15000-tier)"
        continue-on-error: true
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: python scripts/fetch_limit_list.py

      # ── Step 2d.12: Tushare concept membership ─────────────────────────
      # Tushare 15000-tier market-wide concept-to-stock constituent mapping.
      # Forward-compatible: bulk endpoint preferred, concept-list fallback capped.
      - name: "Step 2d.12: Fetch Tushare concept membership (15000-tier)"
        continue-on-error: true
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: python scripts/fetch_concept_detail.py

      # ── Step 2d.13: Tushare 机构调研 ──────────────────────────────────
      # Tushare 15000-tier per-watchlist institutional research / survey records.
      # Forward-compatible: endpoint candidates preserve schema with all_failed
      # and _attempted_endpoints for empirical verification.
      - name: "Step 2d.13: Fetch institutional research (Tushare 15000)"
        continue-on-error: true
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: python scripts/fetch_inst_research.py

      # ── Step 2d.14: Tushare 游资数据 / 龙虎榜机构成交明细 ────────────────
      # Tushare 15000-tier per-watchlist seat-level LHB trading activity.
      # Complements Step 2d.9 stock-level LHB summary with 营业部-level WHO data.
      - name: "Step 2d.14: Fetch top inst seats / 游资数据 (Tushare 15000)"
        continue-on-error: true
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: python scripts/fetch_top_inst.py

      # ── Step 2d.15: Tushare 券商金股 / analyst recommendations ─────────────
      # Tushare 15000-tier per-watchlist broker recommendations and target
      # prices. Complements consensus_forecast with rating-level analyst signal.
      - name: "Step 2d.15: Fetch broker recommendations / 券商金股 (Tushare 15000)"
        continue-on-error: true
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: python scripts/fetch_broker_recommend.py

      # ── Step 2d.16: Tushare 股权质押 / pledge_stat ───────────────────────
      # Tushare 5000-tier per-watchlist pledge ratio and history. China-specific
      # risk reference data for forced-selling / control-risk checks.
      - name: "Step 2d.16: Fetch pledge stat / 股权质押 (Tushare 5000)"
        continue-on-error: true
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: python scripts/fetch_pledge_stat.py

      # ── Step 2d.17: Tushare 限售股解禁 / share_float ─────────────────────
      # Tushare 2000-tier per-watchlist upcoming restricted-share unlocks.
      # China-specific risk reference data for short-term supply pressure.
      - name: "Step 2d.17: Fetch restricted shares / 限售股解禁 (Tushare 2000)"
        continue-on-error: true
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: python scripts/fetch_restricted_shares.py

      # ── Step 2d.18: Tushare 回购 / repurchase ────────────────────────────
      # Tushare 5000-tier per-watchlist 180-day buyback events.
      # Buybacks are positive insider-confidence signals.
      - name: "Step 2d.18: Fetch repurchase / 回购 (Tushare 5000)"
        continue-on-error: true
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: python scripts/fetch_repurchase.py

      # ── Step 2e: VP Score live engine ────────────────────────────────────
      # Runs BEFORE confluence so updated VP scores flow into position sizing.
      # Reads rdcf_*.json + fin_*.json (written by step 1), updates vp_snapshot.json,
      # writes profit_scissors.json.
      - name: Run VP Score live engine
        continue-on-error: true          # non-critical; pure Python, no network
        run: python scripts/vp_engine.py

      # ── Step 2f: Signal confluence scoring (Layer 2) ──────────────────────
      - name: Compute signal confluence scores
        continue-on-error: true          # non-critical; reads signals_*.json
        run: python scripts/signal_confluence.py

      # ── Step 2g: Position sizing (Layer 2) ───────────────────────────────
      - name: Compute position sizing
        continue-on-error: true          # non-critical; reads confluence + vp_snapshot
        run: python scripts/position_sizing.py

      # ── Step 2h: Daily trading decisions (Layer 2 → Layer 1) ──────────────
      - name: Generate daily trading decisions
        continue-on-error: true          # non-critical; reads confluence.json
        run: python scripts/daily_decision.py

      # ── Step 2i: Signal quality analytics (feedback loop) ────────────────
      - name: Compute signal quality analytics
        continue-on-error: true          # non-critical; reads trades + positions
        run: python scripts/signal_quality.py

      # ── Step 2j: Taleb-style fragility scoring (AHF-1) ───────────────────
      # Per AHF_COMPARISON.md: fills the "no downside-fragility dimension"
      # gap. Reads fin_*.json + ohlc_*.json (already populated by step 2 +
      # step 2c). Output: public/data/fragility_*.json per ticker. NOT folded
      # into VP composite (INVARIANT 3 requires Junyan approval).
      - name: Compute fragility scores
        continue-on-error: true          # non-critical; reads fin + ohlc
        run: python scripts/fragility_score.py

      # ── Step 2k: Investor-persona overlay (AHF-3 v1) ─────────────────────
      # Per AHF_COMPARISON.md A3: deterministic Buffett/Burry/Damodaran
      # checklists. Reads market_data.json + rdcf_*.json + fin_*.json (all
      # populated upstream). Output: public/data/persona_overlay.json
      # (single file, keyed by ticker). NOT folded into VP composite
      # (INVARIANT 3). Read alongside VP for richer perspective.
      - name: Compute persona overlay
        continue-on-error: true          # non-critical; reads market + rdcf + fin
        run: python scripts/persona_overlay.py

      # ── Step 2l: AHF-2 Method 2 — EV/EBITDA target-multiple valuation ────
      # Per AHF-2 strategic handoff (.shifts/AHF-2_HANDOFF.md from prior
      # shift 2026-04-30-1532 KR9 DEFER_C consensus): three orthogonal
      # estimators, biotech Option 1 fallback for 6160.HK, NOT folded into
      # VP composite. KR2 (Residual Income) + KR3 (Aggregator) pending.
      - name: Compute EV/EBITDA valuation (AHF-2 Method 2)
        continue-on-error: true          # non-critical; reads market_data + rdcf
        run: python scripts/ev_ebitda_valuation.py

      # ── Step 2m: AHF-2 Method 3 — Residual Income (EBO) valuation ─────────
      # Per AHF-2 strategic handoff: Edwards-Bell-Ohlson book-value-regime
      # valuation. Third orthogonal estimator. WACC used as r_e proxy.
      # Biotech + hyper-growth-EBO graceful-degradation paths. NOT folded
      # into VP composite. KR3 (Aggregator) pending.
      - name: Compute Residual Income valuation (AHF-2 Method 3)
        continue-on-error: true          # non-critical; reads market_data + rdcf + fin
        run: python scripts/residual_income_valuation.py

      # ── Step 2n: AHF-2 Aggregator — median-of-3 triangulation ─────────────
      # Synthesis step: combines Method 1 (rdcf signal) + Method 2
      # (ev_ebitda) + Method 3 (residual_income) into ONE per-ticker
      # triangulated signal. Median-of-SIGNALS (NOT deltas; units
      # incompatible). Closes the AHF-2 v1 methodology backbone. NOT
      # folded into VP composite (INVARIANT 3).
      - name: Compute multi-method triangulated valuation (AHF-2 Aggregator)
        continue-on-error: true          # non-critical; reads rdcf + ev_ebitda + ri JSON outputs
        run: python scripts/multi_method_valuation.py

      # ── Step 3: Sync to Supabase (runs only if secrets are set) ───────────
      - name: Sync to Supabase
        if: env.SUPABASE_URL != ''
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/supabase_sync.py

      # ── Step 4: Commit all JSON files ─────────────────────────────────────
      # Uses 'git add -f --ignore-errors' so missing glob expansions (e.g. no
      # ohlc_*.json yet) don't abort the step. git diff --cached guard means
      # we only commit when there are actual changes.
      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add known fixed-name files only if they exist
          for f in \
            public/data/market_data.json \
            public/data/universe_a.json \
            public/data/universe_hk.json \
            public/data/earnings_calendar.json \
            public/data/flow_data.json \
            public/data/vp_snapshot.json \
            public/data/positions.json \
            public/data/analytics.json \
            public/data/snapshots.json \
            public/data/backtest_results.json \
            public/data/stress_test.json \
            public/data/confluence.json \
            public/data/daily_decision.json \
            public/data/position_sizing.json \
            public/data/signal_quality.json \
            public/data/trades.json \
            public/data/trade_attribution_capsules.json \
            public/data/tushare_market.json \
            public/data/profit_scissors.json \
            public/data/leading_indicators.json \
            public/data/capital_flow.json \
            public/data/limit_list.json \
            public/data/concept_membership.json \
            public/data/fragility_300308_SZ.json \
            public/data/fragility_700_HK.json \
            public/data/fragility_9999_HK.json \
            public/data/fragility_6160_HK.json \
            public/data/fragility_002594_SZ.json \
            public/data/persona_overlay.json \
            public/data/ev_ebitda_valuation.json \
            public/data/residual_income_valuation.json \
            public/data/multi_method_valuation.json; do
            [ -f "$f" ] && git add "$f"
          done

          # Add glob patterns — only if matching files exist (prevents git error)
          shopt -s nullglob
          files=(public/data/ohlc_*.json public/data/fin_*.json \
                 public/data/rdcf_*.json public/data/eqr_*.json \
                 public/data/signals_*.json public/data/cflow_*.json \
                 public/data/tushare/*.json \
                 public/data/chip_distribution/*.json \
                 public/data/consensus_forecast/*.json \
                 public/data/lhb/*.json \
                 public/data/quant_factors/*.json \
                 public/data/inst_research/*.json \
                 public/data/top_inst/*.json \
                 public/data/broker_recommend/*.json \
                 public/data/pledge_stat/*.json \
                 public/data/restricted_shares/*.json)
          shopt -u nullglob
          [ ${#files[@]} -gt 0 ] && git add "${files[@]}"

          # Only commit if something changed
          git diff --cached --quiet && echo "No data changes to commit." || \
            git commit -m "data: daily update $(date -u +'%Y-%m-%d %H:%M') UTC [fetcher:${{ steps.fetcher.outcome }}]"
          git push || echo "Nothing to push."

      # ── Step 5: Telegram alerts (runs only if secrets are set) ────────────
      - name: Send Telegram alerts
        if: env.TELEGRAM_BOT_TOKEN != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/telegram_alert.py

      # ── Step 6: Trigger GitHub Pages redeploy ─────────────────────────────
      # github-actions[bot] push commits do NOT auto-trigger other workflows.
      # We explicitly dispatch deploy.yml via workflow_dispatch (allowed with GITHUB_TOKEN).
      - name: Redeploy GitHub Pages
        run: gh workflow run deploy.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
